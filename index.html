<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>趣味小项目</title>
    <style>
      body {
        height: 100vh;
        margin: 0;
        font-family:
          Microsoft YaHei,
          sans-serif;
        overflow: hidden;
        background-image: url(https://majotabi.jp/images/top-main/3/vis.jpg);
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        background-attachment: fixed;
      }

      .container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      h1 {
        color: rgb(255, 255, 255);
        font-size: 80px;
        text-shadow:
          2px 2px 4px rgba(0, 0, 0, 0.5),
          0 0 10px rgba(255, 255, 255, 0.7);
        margin-bottom: 50px;
        z-index: 10;
      }

      #myBtn {
        font-size: 30px;
        background: rgba(11, 47, 228, 0);
        color: white;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        position: fixed; /* 改成 fixed 更好 */
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 20;
      }

      #myBtn:hover {
        transform: scale(1.1) translate(-50%, -50%);
        background: rgba(252, 252, 252, 0.797);
      }

      #hint {
        color: rgb(255, 255, 255);
        font-size: 20px;
        margin-top: 50px;
        z-index: 10;
      }

      /* 新增弹窗容器样式 */
      #winModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .modal-content {
        background: linear-gradient(145deg, #8b4de8, #b87cf7);
        padding: 40px 60px;
        border-radius: 30px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        animation: modalPop 0.3s ease;
        border: 3px solid #ffd700;
        position: relative;
      }

      @keyframes modalPop {
        0% {
          transform: scale(0.5);
          opacity: 0;
        }
        80% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .modal-content h2 {
        color: white;
        font-size: 48px;
        margin: 0 0 20px 0;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .modal-content p {
        color: white;
        font-size: 24px;
        margin: 20px 0;
      }

      .modal-content button {
        background: #ffd700;
        color: #333;
        border: none;
        padding: 15px 40px;
        font-size: 24px;
        border-radius: 50px;
        cursor: pointer;
        margin-top: 20px;
        font-weight: bold;
        transition: all 0.3s;
      }

      .modal-content button:hover {
        transform: scale(1.1);
        background: #ffed4e;
        box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
      }

      .close-btn {
        position: absolute;
        top: 15px;
        right: 20px;
        color: white;
        font-size: 30px;
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
        width: auto !important;
      }

      .close-btn:hover {
        transform: scale(1.2);
        background: none !important;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>灰之魔女的瞬移魔法</h1>
      <button id="myBtn">
        <img
          src="https://i.pinimg.com/736x/3b/66/ef/3b66efc64932680b1c429fb9e1b35936.jpg"
          alt="图标"
          style="width: 93px; height: 163px"
        />
      </button>
      <p id="hint">试试抓到我~</p>
    </div>

    <div id="winModal">
      <div class="modal-content">
        <h2>✨ 魔法成功 ✨</h2>
        <p>你抓住了灰之魔女！</p>
        <img
          src="https://i.pinimg.com/736x/3b/66/ef/3b66efc64932680b1c429fb9e1b35936.jpg"
          alt="魔女"
          style="width: 60px; height: 105px; margin: 10px 0"
        />
        <p>🎉 恭喜你获得魔法力量 🎉</p>
        <button onclick="closeModal()">太棒了！</button>
      </div>
    </div>

    <script>
      const btn = document.getElementById("myBtn");
      const modal = document.getElementById("winModal");

      function showModal() {
        modal.style.display = "flex";
      }

      function closeModal() {
        modal.style.display = "none";
      }

      btn.addEventListener("mouseenter", function () {
        const btnWidth = btn.offsetWidth;
        const btnHeight = btn.offsetHeight;

        const maxX = window.innerWidth - btnWidth;
        const maxY = window.innerHeight - btnHeight;

        // 确保按钮不会跑到屏幕外
        const randomX = Math.max(
          0,
          Math.min(maxX, Math.floor(Math.random() * maxX)),
        );
        const randomY = Math.max(
          0,
          Math.min(maxY, Math.floor(Math.random() * maxY)),
        );

        btn.style.position = "fixed";
        btn.style.left = randomX + "px";
        btn.style.top = randomY + "px";
        btn.style.transform =
          "scale(1.2) rotate(" + (Math.random() * 20 - 10) + "deg)";
      });

      btn.addEventListener("click", function () {
        showModal();

        btn.style.position = "fixed";
        btn.style.left = "50%";
        btn.style.top = "50%";
        btn.style.transform = "translate(-50%, -50%) scale(1)";
      });
    </script>
  </body>
</html>
